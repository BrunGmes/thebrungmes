<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Entre em contato com Bruno Gomes">
  <meta name="author" content="Bruno Gomes">
  <title data-translate="contactTitleDoc">Contato - Bruno Gomes</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="js/nav-component.js"></script>
  <script defer src="js/lang.js"></script>
  <script defer src="js/contact-form.js"></script>
</head>
<body class="min-h-screen flex flex-col">

  <nav id="site-nav" aria-label="Navegação principal"></nav>

  <main class="flex-grow container mx-auto px-4 py-12 max-w-lg" id="main-content">
    <section class="bg-white rounded-lg shadow-lg p-8">
      <h2 data-translate="contactTitle" class="text-3xl font-bold text-center mb-4 text-gray-800">Entre em Contato</h2>
      <p data-translate="contactText" class="text-gray-600 text-center mb-8">Fale comigo através do formulário abaixo ou pelas redes sociais.</p>
      <div id="form-feedback" class="mb-4 text-center h-6"></div>
      <form id="contact-form" action="https://formspree.io/f/SEU_FORM_ID_REAL" method="POST" class="space-y-5">
        <div>
          <label for="input-name" data-translate="labelName" class="block text-sm font-medium text-gray-700 mb-1">Nome</label>
          <input type="text" id="input-name" name="name" required data-translate-placeholder="placeholderName" placeholder="Seu nome"
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
        </div>
        <div>
          <label for="input-email" data-translate="labelEmail" class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
          <input type="email" id="input-email" name="email" required data-translate-placeholder="placeholderEmail" placeholder="seu@email.com"
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200">
        </div>
        <div>
          <label for="input-message" data-translate="labelMessage" class="block text-sm font-medium text-gray-700 mb-1">Mensagem</label>
          <textarea id="input-message" name="message" rows="5" required data-translate-placeholder="placeholderMessage" placeholder="Escreva sua mensagem aqui..."
            class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"></textarea>
        </div>
        <button data-translate="btnSend" type="submit" id="submit-button"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-md transition duration-300 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
          Enviar Mensagem
        </button>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div>
      <p data-translate="footer">&copy; <span id="currentYear"></span> Bruno Gomes - Todos os direitos reservados.</p>
      <p class="footer-subtitle" data-translate="heroSubtitle">Designer Gráfico &amp; Desenvolvedor Web</p>
    </div>
  </footer>

</body>
</html>
